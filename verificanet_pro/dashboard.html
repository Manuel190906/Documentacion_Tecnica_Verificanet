<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Verificanet</title>
    <link rel="stylesheet" href="css/styles-pro.css">
    <style>
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--dark);
            color: white;
            padding: 20px;
        }

        .user-info {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .user-role {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 5px;
        }

        .role-admin { background: #28a745; }
        .role-empleado { background: #0066cc; }
        .role-cliente { background: #6c757d; }

        .menu-item {
            padding: 12px 16px;
            margin: 5px 0;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .menu-item.active {
            background: var(--primary);
        }

        .content {
            flex: 1;
            padding: 30px;
            background: var(--light-gray);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 5px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--dark);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            text-align: left;
            padding: 12px;
            background: var(--light-gray);
            font-weight: 600;
            font-size: 14px;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-info { background: #e3f2fd; color: #1976d2; }
        .badge-warning { background: #fff3e0; color: #f57c00; }
        .badge-success { background: #e8f5e9; color: #388e3c; }
        .badge-danger { background: #ffebee; color: #d32f2f; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn-logout {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        .btn-logout:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo" style="margin-bottom: 30px;">
                <h1 style="font-size: 20px; letter-spacing: 1px;">VERIFICANET</h1>
            </div>

            <div class="user-info">
                <div class="user-name" id="user-name">Usuario</div>
                <span class="user-role" id="user-role">Rol</span>
            </div>

            <nav>
                <div class="menu-item active" onclick="showSection('dashboard')">Dashboard</div>
                <div class="menu-item" onclick="showSection('incidencias')">Incidencias</div>
                <div class="menu-item" onclick="showSection('crear-incidencia')" data-role-required="cliente">Nueva Incidencia</div>
            </nav>

            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Dashboard Section -->
            <section id="dashboard" class="section active">
                <h1>Dashboard</h1>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="stat-clientes">0</div>
                        <div class="stat-label">Clientes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-incidencias">0</div>
                        <div class="stat-label">Incidencias</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="stat-abiertas">0</div>
                        <div class="stat-label">Abiertas</div>
                    </div>
                </div>

                <div class="card">
                    <h2>Últimas Incidencias</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Estado</th>
                                <th>Prioridad</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="incidencias-list">
                            <tr>
                                <td colspan="5" style="text-align:center; color:#999;">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Incidencias Section -->
            <section id="incidencias" class="section">
                <h1>Incidencias</h1>

                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Estado</th>
                                <th>Prioridad</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="incidencias-list-all">
                            <tr>
                                <td colspan="5" style="text-align:center; color:#999;">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Crear Incidencia Section (solo clientes) -->
            <section id="crear-incidencia" class="section">
                <h1>Nueva Incidencia</h1>

                <div class="card">
                    <form id="form-crear-incidencia" onsubmit="crearIncidencia(event)">
                        <div class="form-group">
                            <label>Título</label>
                            <input type="text" id="inc-titulo" required>
                        </div>

                        <div class="form-group">
                            <label>Descripción</label>
                            <textarea id="inc-descripcion" required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Prioridad</label>
                            <select id="inc-prioridad">
                                <option value="baja">Baja</option>
                                <option value="media" selected>Media</option>
                                <option value="alta">Alta</option>
                                <option value="critica">Crítica</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-professional">Crear Incidencia</button>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <script src="js/app-pro.js"></script>
</body>
</html>
